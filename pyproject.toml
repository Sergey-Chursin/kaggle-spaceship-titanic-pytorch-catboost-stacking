[tool.ruff]
# Устанавливаем максимальную длину строки
line-length = 88

# Указываем версию Python, под которую пишется код.
target-version = "py312"

# Указываем попку с исходниками чтобы ruff понимал что импорты из неё внутренние.
# src = ["src"]

[tool.ruff.lint]
# Выбираем наборы правил для проверки.
# E, F — стандартный набор flake8
# I — сортировка импортов (замена isort)
# B — flake8-bugbear (поиск вероятных багов)
# C4 — flake8-comprehensions (помогает писать идиоматичные list/dict comprehensions)
# A — flake8-builtins (предотвращает случайное переопределение встроенных имен, например list=...)
select = ["E", "F", "I", "B", "C4", "A"]

# Никогда не проверять правило E501 (строка слишком длинная),
# так как форматтер сам этим займется.
ignore = ["E501"]


[tool.ruff.format]
# Предпочитаемый стиль кавычек.
quote-style = "double"

[tool.ruff.lint.per-file-ignores]
# Для всех .py файлов, которые лежат ВНУТРИ папки "tests"
# на любом уровне вложенности,
# отключаем следующие проверки
"tests/**/*.py" = [
    "S101",   # Разрешаем использовать `assert`
    "ARG001", # Разрешаем неиспользуемые аргументы функций
]

[tool.mypy]
# --- Основные настройки проекта ---
python_version = "3.12"
warn_unused_configs = true      # Предупреждать, если какие-то секции в этой конфигурации не используются. Помогает держать конфиг в чистоте.
show_error_codes = true         # Показывать коды ошибок
pretty = true                   # Делает вывод ошибок более читаемым

# --- Плагины для расширения возможностей mypy ---

# Этот плагин позволяет mypy понимать методы Pydantic (генерацию моделей, валидацию),
# что избавляет от множества ложных ошибок.
plugins = [
  "pydantic.mypy"
]

# --- Правила для конкретных модулей  ---
# Задаём особые правила для отдельных библиотек.
[[tool.mypy.overrides]]
module = [
    "catboost.*", # Для CatBoost нет официальных "стабов", поэтому мы просим mypy просто игнорировать отсутствие типов в этой библиотеке.
    #"psutil.*",
    #"tqdm.*",
    #"requests.*"
]
# Это отключает ошибку "[import-untyped]" ТОЛЬКО для модулей, перечисленных выше.
ignore_missing_imports = true 